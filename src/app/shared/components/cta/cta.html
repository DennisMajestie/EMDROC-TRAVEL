<section class="py-12 md:py-24">
  <div class="max-w-7xl mx-auto px-margin-mobile md:px-8">
    <div class="rounded-[40px] overflow-hidden relative p-6 md:p-20 cta-gradient">
      @if (bgImage) {
        <div class="absolute inset-0 opacity-10 pointer-events-none">
          <div class="w-full h-full bg-cover bg-center" [style.background-image]="'url(' + bgImage + ')'"></div>
        </div>
      }
      <div class="relative z-10 flex flex-col md:flex-row items-center justify-between gap-8">
        <div class="max-w-xl text-center md:text-left">
          <h2 class="text-3xl lg:text-4xl font-extrabold text-white mb-3">{{ title }}</h2>
          <p class="text-lg text-white/80">{{ description }}</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-4">
          <a class="bg-white text-brand-teal font-bold px-10 py-5 rounded-2xl hover:bg-white/90 transition-all shadow-xl text-center" [routerLink]="primaryBtnLink">
            {{ primaryBtnText }}
          </a>
          @if (secondaryBtnText && secondaryBtnLink) {
            <a class="border border-white/30 backdrop-blur-md text-white font-bold px-10 py-5 rounded-2xl hover:bg-white/10 transition-all text-center" [routerLink]="secondaryBtnLink">
              {{ secondaryBtnText }}
            </a>
          }
        </div>
      </div>
    </div>
  </div>
</section>
